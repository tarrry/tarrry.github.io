<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CPS Test</title>
  <style>
    body, html {
      height: 100%;
      margin: 0;
    }

    #clickArea {
      width: 100%;
      height: 100vh;
      background-color: lightblue;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 20px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<div id="clickArea" onclick="handleClick()">Click me!</div>
<p id="cpsCounter">CPS: 0</p>

<script>
  let clickCount = 0;
  let startTime;

  function handleClick() {
    if (!startTime) {
      startTime = new Date().getTime();
    }
    clickCount++;

    // Update CPS every second
    if (new Date().getTime() - startTime >= 1000) {
      const cps = clickCount / 1; // 1 second
      document.getElementById('cpsCounter').innerText = `CPS: ${cps.toFixed(2)}`;
      clickCount = 0;
      startTime = new Date().getTime();
    }
  }
</script>

</body>
</html>
